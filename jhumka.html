    <style>
        body { background: #f9f9f9; }

        .product-card {
            background: #fff;
            border-radius: 15px;
            overflow: hidden;
            transition: 0.3s;
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.15);
        }
        .product-img-wrap {
            position: relative;
            overflow: hidden;
        }
        .product-img-wrap img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            transition: 0.3s;
        }
        .product-card:hover .product-img-wrap img {
            transform: scale(1.05);
        }
        .hover-actions {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            opacity: 0;
            transition: 0.3s;
        }
        .product-card:hover .hover-actions {
            opacity: 1;
        }
        .btn-white { background: #fff; border: none; }
        .btn-white:hover { background: #d4af37; color: #fff; }
        .text-gold { color: #d4af37; font-weight: bold; }

        .section-title { text-align: center; margin-bottom: 2.5rem; }
    </style>
</head>
